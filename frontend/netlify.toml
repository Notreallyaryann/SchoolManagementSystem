[build]
  publish = "frontend/build"
  command = "npm run build"

[build.environment]
  # Skip optional dependencies (like fsevents) during npm install
  NPM_FLAGS = "--no-optional --verbose"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"


